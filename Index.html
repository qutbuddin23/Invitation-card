<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Invitation Editor</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f0f0f0;
    text-align: center;
    margin: 0;
    padding: 20px;
}
.controls {
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
}
.controls input, .controls button {
    padding: 10px;
    font-size: 16px;
}
#card-container {
    position: relative;
    width: 90%;
    max-width: 800px;
    margin: 0 auto;
}
#card {
    position: relative;
    width: 100%;
}
#card img {
    width: 100%;
    height: auto;
    border-radius: 10px;
    display: block;
}
.editable-text {
    position: absolute;
    font-weight: bold;
    color: black;
    text-align: center;
    font-family: 'Times New Roman', serif;
    word-wrap: break-word;
}
/* Responsive positions using percentages */
#toField { top: 65%; left: 50%; transform: translate(-50%, -50%); font-size: 2vw; }
#inviteesField { top: 58%; left: 50%; transform: translate(-50%, -50%); font-size: 1.8vw; }

#downloadBtn {
    background-color: #007bff;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
</style>
</head>
<body>

<h2>Editable Invitation</h2>

<div class="controls">
    <input type="text" id="toInput" placeholder="Enter Guest Name">
    <input type="number" id="ladiesInput" placeholder="Ladies Count">
    <input type="number" id="gentsInput" placeholder="Gents Count">
    <button onclick="updateCard()">Update</button>
    <button id="downloadBtn" onclick="downloadCard()">Download Invitation</button>
</div>

<div id="card-container">
    <div id="card">
        <!-- Default image set to your latest uploaded invitation -->
        <img id="cardImage" src="/mnt/data/1000050021.png" alt="Invitation">
        <div id="toField" class="editable-text">Guest Name</div>
        <div id="inviteesField" class="editable-text">Ladies (25) & Gents (35)</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
function updateCard() {
    const guest = document.getElementById('toInput').value || "Guest Name";
    const ladies = document.getElementById('ladiesInput').value || 25;
    const gents = document.getElementById('gentsInput').value || 35;

    document.getElementById('toField').innerText = guest;
    document.getElementById('inviteesField').innerText = `Ladies (${ladies}) & Gents (${gents})`;
}

function downloadCard() {
    html2canvas(document.getElementById('card')).then(canvas => {
        const link = document.createElement('a');
        link.download = 'invitation.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    });
}
</script>

</body>
</html>
