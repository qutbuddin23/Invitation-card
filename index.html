<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Invitation Editor</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f0f0f0;
    margin: 0;
    padding: 20px;
    text-align: center;
}
#controls {
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
}
#controls input, #controls button {
    padding: 10px;
    font-size: 16px;
}
#card-container {
    position: relative;
    width: 90%;
    max-width: 800px;
    margin: 0 auto;
}
#card {
    position: relative;
    width: 100%;
}
#card img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 10px;
}
.editable-text {
    position: absolute;
    font-weight: bold;
    font-family: 'Times New Roman', serif;
    color: black;
    text-align: center;
    word-wrap: break-word;
}
/* Proper placement */
#inviteesField { top: 72%; left: 50%; transform: translate(-50%, -50%); font-size: 1.6vw; width: 70%; }
#nameField { top: 78%; left: 50%; transform: translate(-50%, -50%); font-size: 2vw; width: 70%; }
#toField { top: 85%; left: 50%; transform: translate(-50%, -50%); font-size: 1.6vw; width: 70%; }
#downloadBtn {
    background-color: #007bff;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
</style>
</head>
<body>

<h2>Editable Birthday Invitation</h2>

<div id="controls">
    <input type="text" id="inviteesInput" placeholder="Enter Invitees">
    <input type="text" id="nameInput" placeholder="Enter Child's Name">
    <input type="text" id="toInput" placeholder="Enter Guest Name">
    <button onclick="updateCard()">Update</button>
    <button onclick="downloadCard()">Download Invitation</button>
</div>

<div id="card-container">
    <div id="card">
        <!-- Background image from base64 -->
        <img id="cardImage" alt="Invitation">
        <!-- Editable fields -->
        <div id="inviteesField" class="editable-text">Invitees Here</div>
        <div id="nameField" class="editable-text">Child's Name</div>
        <div id="toField" class="editable-text">To: Guest</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
// Load Base64 image from file
fetch('cb-base64-string.txt')
    .then(response => response.text())
    .then(base64 => {
        document.getElementById('cardImage').src = 'data:image/jpeg;base64,' + base64.trim();
    })
    .catch(err => console.error('Failed to load Base64 image:', err));

function updateCard() {
    const invitees = document.getElementById('inviteesInput').value || "Invitees Here";
    const name = document.getElementById('nameInput').value || "Child's Name";
    const to = document.getElementById('toInput').value || "To: Guest";

    document.getElementById('inviteesField').innerText = invitees;
    document.getElementById('nameField').innerText = name;
    document.getElementById('toField').innerText = to;
}

function downloadCard() {
    html2canvas(document.getElementById('card')).then(canvas => {
        const link = document.createElement('a');
        link.download = 'birthday_invitation.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    });
}
</script>

</body>
</html>
