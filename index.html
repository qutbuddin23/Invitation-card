<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Draggable Invitation Editor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
<style>
body { font-family: Arial, sans-serif; background:#f0f0f0; text-align:center; margin:0; padding:20px; }
#controls { margin-bottom:10px; display:flex; gap:5px; flex-wrap:wrap; justify-content:center; }
#canvas-container { display:inline-block; border:1px solid #ccc; }
button,input { padding:5px; font-size:16px; }
</style>
</head>
<body>

<h2>Editable & Draggable Invitation</h2>

<div id="controls">
    <input type="text" id="textInput" placeholder="Enter text">
    <button onclick="addText()">Add Text</button>
    <button onclick="deleteSelected()">Delete Selected</button>
    <button onclick="download()">Download PNG</button>
</div>

<div id="canvas-container">
    <canvas id="invitationCanvas" width="800" height="1200"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
const canvas = new fabric.Canvas('invitationCanvas');

// Load your uploaded image as background
fabric.Image.fromURL('/mnt/data/1000050063.jpg', function(img) {
    img.set({ selectable: false });
    img.scaleToWidth(canvas.width);
    img.scaleToHeight(canvas.height);
    canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas));
});

// Add new text
function addText() {
    const value = document.getElementById('textInput').value.trim();
    if (!value) return;
    const text = new fabric.IText(value, {
        left: 100,
        top: 100,
        fontSize: 24,
        fill: 'black',
        fontFamily: 'Times New Roman',
        editable: true
    });
    canvas.add(text).setActiveObject(text);
    document.getElementById('textInput').value = '';
}

// Delete selected text
function deleteSelected() {
    const active = canvas.getActiveObject();
    if (active) canvas.remove(active);
}

// Download the canvas as PNG
function download() {
    canvas.discardActiveObject();
    canvas.renderAll();
    const dataURL = canvas.toDataURL({ format: 'png' });
    const link = document.createElement('a');
    link.href = dataURL;
    link.download = 'invitation.png';
    link.click();
}
</script>

</body>
</html>
